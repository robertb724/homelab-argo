apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  sources:
  - repoURL: oci://docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.2.1
    helm:
      valueFiles:
      - $values/infra/envoy-gateway/values.yaml
  - repoURL: https://github.com/robertb724/homelab-argo
    targetRevision: main
    ref: values
  - repoURL: https://github.com/robertb724/homelab-argo
    targetRevision: main
    path: infra/envoy-gateway/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      selfHeal: false
      prune: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
